<template>
<lightning-card title="Financial Accounts" icon-name="custom:custom17">
<div slot="actions">
<lightning-button label="New" onclick={handleNew}></lightning-button>
</div>
 
        <div class="slds-p-around_medium">
<lightning-datatable
                key-field="Id"
                data={data}
                columns={columns}
                onrowaction={handleRowAction}
                hide-checkbox-column
                column-widths-mode="auto">
</lightning-datatable>
 
            <div lwc:if={isDataEmpty}>
<div class="slds-text-align_center slds-p-vertical_medium slds-text-color_weak">
                    No financial accounts found for this client.
</div>
</div>
</div>
</lightning-card>
 
    <div lwc:if={isModalOpen}>
<section class="slds-modal slds-fade-in-open">
<div class="slds-modal__container">
 
                <header class="slds-modal__header">
<button class="slds-button slds-button_icon slds-modal__close"
                            onclick={handleCancel}>
<lightning-icon icon-name="utility:close" size="small"></lightning-icon>
</button>
<h2 class="slds-text-heading_medium">{modalTitle}</h2>
</header>
 
                <div class="slds-modal__content slds-p-around_medium">
<!-- ✅ lightning-record-edit-form es más estable en modales -->
<lightning-record-edit-form
                        object-api-name="FinancialAccount__c"
                        record-id={currentRecordId}
                        onsuccess={handleSuccess}
                        onerror={handleError}>
 
                        <lightning-messages></lightning-messages>
 
                        <div class="slds-grid slds-wrap slds-gutters">
<div class="slds-col slds-size_1-of-2">
<lightning-input-field field-name="Name"></lightning-input-field>
</div>
<div class="slds-col slds-size_1-of-2">
<lightning-input-field field-name="CardType__c"></lightning-input-field>
</div>
<div class="slds-col slds-size_1-of-2">
<lightning-input-field field-name="ApprovedCreditLine__c"></lightning-input-field>
</div>
<div class="slds-col slds-size_1-of-2">
<lightning-input-field field-name="Status__c"></lightning-input-field>
</div>
<div class="slds-col slds-size_1-of-2">
<lightning-input-field field-name="AccountId__c"
                                    value={recordId}>
</lightning-input-field>
</div>
<div class="slds-col slds-size_1-of-2">
<lightning-input-field field-name="OpportunityId__c"></lightning-input-field>
</div>
<div class="slds-col slds-size_1-of-2">
<lightning-input-field field-name="ProductId__c"></lightning-input-field>
</div>
<div class="slds-col slds-size_1-of-2">
<lightning-input-field field-name="IssuanceDate__c"></lightning-input-field>
</div>
<div class="slds-col slds-size_1-of-2">
<lightning-input-field field-name="CardNumber__c"></lightning-input-field>
</div>
</div>
 
                        <div class="slds-modal__footer">
<lightning-button
                                label="Cancel"
                                onclick={handleCancel}>
</lightning-button>
<lightning-button
                                type="submit"
                                variant="brand"
                                label="Save">
</lightning-button>
</div>
 
                    </lightning-record-edit-form>
</div>
 
            </div>
</section>
<div class="slds-backdrop slds-backdrop_open"></div>
</div>
 
</template>
